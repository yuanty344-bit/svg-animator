<body>
<div class="preview-area" id="previewArea">
  <div class="preview-bg" id="previewBg">
    <svg id="previewSvg" viewBox="0 0 1024 1024"></svg>
  </div>
  <div class="upload-float" id="uploadFloat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
    <span>上传 SVG</span>
    <input type="file" id="fileInput" accept=".svg">
  </div>
</div>

<div class="control-bar" id="controlBar">
  <div class="ctrl-group">
    <label>进度</label>
    <input type="range" id="timeline" min="0" max="100" value="0" step="0.1" title="键盘←→移动 (Shift加速)">
    <span class="val" id="timeVal">0%</span>
  </div>
  <div class="ctrl-group">
    <label>速度</label>
    <input type="range" id="speed" min="0.25" max="4" value="1" step="0.25">
    <span class="val" id="speedVal">1×</span>
  </div>
  <div class="ctrl-group">
    <label>描边宽</label>
    <input type="range" id="strokeWidth" min="1" max="20" value="8" step="0.5">
    <span class="val" id="strokeWidthVal">8</span>
  </div>
  <div class="ctrl-group">
    <input type="color" id="strokeColor" value="#ffffff">
    <input type="color" id="fillColor" value="#ffffff">
    <label class="sync-inline"><input type="checkbox" id="syncColors" checked>同步</label>
    <label class="sync-inline" title="恢复原图颜色"><input type="checkbox" id="preserveColors">保留原色</label>
    <label class="sync-inline" title="路径逐条绘制"><input type="checkbox" id="sequentialMode">逐条绘制</label>
  </div>
  <div class="ctrl-group">
    <label>背景</label>
    <input type="color" id="bgColor" value="#000000">
  </div>
  <div class="btn-row">
    <div class="icon-btn" id="playPauseBtn" title="暂停/继续">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
    </div>
    <div class="icon-btn" id="layerBtn" title="图层设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
    </div>
    <div class="icon-btn" id="pasteBtn" title="粘贴SVG代码">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 2v2h8V2" stroke-linecap="round"/></svg>
    </div>
    <div class="icon-btn" id="resetBtn" title="重置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg>
    </div>
    <div class="icon-btn" id="shareBtn" title="复制SVG代码">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.7 13.7l6.6 3.3M15.3 5.3l-6.6 3.3" stroke-linecap="round"/></svg>
    </div>
    <select id="exportFormat" class="export-select">
      <option value="html">HTML</option>
      <option value="svg">SVG</option>
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
    </select>
    <button class="text-btn" id="dlBtn">⬇ 下载</button>
  </div>
</div>

<div class="layer-panel" id="layerPanel">
  <div class="layer-header" id="layerHeader">
    <span>图层设置</span>
    <button class="layer-close" id="layerClose">✕</button>
  </div>
  <div class="layer-body">
    <label class="auto-bg-toggle">
      <input type="checkbox" id="autoBgCheckPanel" checked> 自动背景（大面积在后）
    </label>
    <div class="path-list" id="layerPathList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="paste-panel" id="pastePanel">
  <textarea id="pasteText" placeholder="在此粘贴SVG代码..."></textarea>
  <div class="row">
    <button class="text-btn" id="cancelPaste">取消</button>
    <button class="text-btn" id="applyPaste">应用</button>
  </div>
</div>

</body>
</html>
