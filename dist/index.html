ow{display:flex;gap:8px;align-items:center}.icon-btn{background:#ffffff0f;border:1px solid rgba(255,255,255,.15);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;color:#fff}.icon-btn:hover{background:#ffffff26;border-color:#fff6}.icon-btn svg{width:18px;height:18px}.text-btn{background:#ffffff0f;border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:8px 16px;color:#fff;font-size:12px;cursor:pointer;transition:.3s;letter-spacing:.03em;white-space:nowrap}.text-btn:hover{background:#ffffff26;border-color:#fff6}.export-select{background:#ffffff0f;border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:6px 12px;color:#fff;font-size:12px;cursor:pointer;outline:none;letter-spacing:.03em;transition:.3s}.export-select:hover{background:#ffffff1f;border-color:#fff6}.export-select option{background:#111;color:#fff}.layer-panel{position:fixed;top:100px;left:100px;z-index:30;background:#141414f2;border:1px solid rgba(255,255,255,.25);border-radius:14px;width:260px;max-height:360px;display:none;flex-direction:column;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);box-shadow:0 8px 32px #0009}.layer-header{padding:10px 14px;cursor:move;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;font-size:13px;opacity:.8}.layer-close{cursor:pointer;opacity:.6;font-size:18px;line-height:1;background:transparent;border:none;color:#fff}.layer-close:hover{opacity:1}.layer-body{padding:14px 14px 8px;overflow-y:auto;flex:1}.layer-footer{padding:0 14px 10px;flex-shrink:0}.auto-bg-toggle{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.9;margin-bottom:12px}.auto-bg-toggle input{accent-color:#fff;width:14px;height:14px}.path-list{display:flex;flex-direction:column;gap:6px}.path-item{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8}.path-item input{accent-color:#fff;width:14px;height:14px}.path-item .fill-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.3);flex-shrink:0}.toast{position:fixed;bottom:40px;left:50%;transform:translate(-50%) translateY(20px);background:#ffffff26;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:8px 24px;font-size:13px;letter-spacing:.04em;opacity:0;transition:all .3s ease;pointer-events:none;z-index:20}.toast.show{opacity:1;transform:translate(-50%) translateY(0)}.paste-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#141414f2;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px;display:none;z-index:25;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);flex-direction:column;gap:10px;width:360px;max-width:90vw}.paste-panel textarea{width:100%;height:120px;background:#ffffff0d;color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px;font-size:12px;resize:vertical;outline:none}.paste-panel .row{display:flex;gap:8px;justify-content:flex-end}@media(max-width:768px){.top-bar{padding:4px 6px}.top-bar .bar-row{gap:5px;font-size:10px}.top-bar .bar-label{display:none}.top-bar .icon-btn{width:auto;height:22px;padding:0 5px}.top-bar .export-select{padding:3px 6px;font-size:10px}.top-bar .text-btn{padding:4px 8px;font-size:10px}.bar-sep{margin:0 2px}.bottom-bar{gap:6px;padding:5px 8px}.ctrl-group input[type=range]{width:50px}.ctrl-group{font-size:10px}.upload-inline{padding:3px 8px;font-size:9px}.easing-select{font-size:9px;padding:2px 4px}}@media(max-width:480px){.top-bar .sync-inline{font-size:9px}.bottom-bar{gap:4px;padding:4px 6px}.timeline-wrap .val{min-width:28px}}</style>
</head>
<body>
<!-- 顶部栏：配置层 -->
<div class="top-bar" id="topBar">
  <div class="bar-row">
    <!-- 组0：上传 -->
    <div class="upload-inline" id="uploadFloat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
      <span>上传 SVG</span>
      <input type="file" id="fileInput" accept=".svg">
    </div>
    <span class="bar-sep"></span>
    <!-- 组1：颜色 -->
    <span class="bar-label">描边</span><input type="color" id="strokeColor" value="#ffffff" title="描边颜色">
    <span class="bar-label">填色</span><input type="color" id="fillColor" value="#ffffff" title="填色颜色">
    <label class="sync-inline" title="填色跟随描边"><input type="checkbox" id="syncColors" checked>同步</label>
    <span class="bar-sep"></span>
    <!-- 组2：动画选项 -->
    <label class="sync-inline" title="恢复SVG原始颜色"><input type="checkbox" id="preserveColors">保留原色</label>
    <label class="sync-inline" title="路径逐条绘制"><input type="checkbox" id="sequentialMode">逐条</label>
    <span class="bar-label">间隔</span><input type="range" id="staggerFactor" min="0.5" max="3" value="1" step="0.25"><span class="val" id="staggerVal">1×</span>
    <label class="sync-inline" title="粒子从四周飞入聚合"><input type="checkbox" id="particleMode">粒子</label>
    <label class="sync-inline" title="动画结束后保留描边轮廓"><input type="checkbox" id="keepStrokes" checked>保留描边</label>
    <select id="easing" class="easing-select" title="动画缓动曲线">
      <option value="linear">线性</option>
      <option value="ease-in">缓入</option>
      <option value="ease-out">缓出</option>
      <option value="ease-in-out">缓入缓出</option>
    </select>
    <span class="bar-sep"></span>
    <button class="mini-btn" id="presetFast" title="快速预览">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>快速
    </button>
    <button class="mini-btn" id="presetStd" title="标准展示">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>标准
    </button>
    <button class="mini-btn" id="presetFilm" title="电影级慢速">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20M17 2v20M2 7h5M2 17h5M17 7h5M17 17h5"/></svg>电影
    </button>
    <span class="bar-sep"></span>
    <!-- 组3：背景 -->
    <span class="bar-label">背景</span><input type="color" id="bgColor" value="#000000" title="背景颜色">
    <span class="bar-sep"></span>
    <!-- 组4：工具 -->
    <div class="icon-btn" id="pasteBtn" title="粘贴SVG代码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 2v2h8V2" stroke-linecap="round"/></svg><span class="icon-label">粘贴</span></div>
    <div class="icon-btn" id="layerBtn" title="图层设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg><span class="icon-label">图层</span></div>
    <div class="icon-btn" id="resetBtn" title="恢复默认设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg><span class="icon-label">重置</span></div>
    <span class="bar-sep"></span>
    <!-- 组5：导出 -->
    <div class="icon-btn" id="shareBtn" title="复制当前画面SVG代码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.7 13.7l6.6 3.3M15.3 5.3l-6.6 3.3" stroke-linecap="round"/></svg><span class="icon-label">分享</span></div>
    <select id="exportFormat" class="export-select"><option value="html">HTML</option><option value="svg">SVG</option><option value="png">PNG</option><option value="jpg">JPG</option></select>
    <button class="text-btn" id="dlBtn">⬇ 下载</button>
  </div>
</div>

<div class="preview-area" id="previewArea">
  <div class="preview-bg" id="previewBg">
    <svg id="previewSvg" viewBox="0 0 1024 1024"></svg>
    <canvas id="particleCanvas"></canvas>
  </div>
</div>

<!-- 底部栏：播放层 -->
<div class="bottom-bar" id="bottomBar">
  <div class="icon-btn" id="playPauseBtn" title="暂停 / 继续">
    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
  </div>
  <div class="timeline-wrap">
    <input type="range" id="timeline" min="0" max="100" value="0" step="0.1" title="键盘←→移动 (Shift加速)">
    <span class="val" id="timeVal">0%</span>
  </div>
  <div class="ctrl-group">
    <label>速度</label>
    <input type="range" id="speed" min="0.25" max="4" value="1" step="0.25">
    <span class="val" id="speedVal">1×</span>
  </div>
  <div class="ctrl-group">
    <label>描边</label>
    <input type="range" id="strokeWidth" min="1" max="20" value="8" step="0.5">
    <span class="val" id="strokeWidthVal">8</span>
  </div>
</div>

<div class="layer-panel" id="layerPanel">
  <div class="layer-header" id="layerHeader">
    <span>图层设置</span>
    <button class="layer-close" id="layerClose">✕</button>
  </div>
  <div class="layer-body">
    <label class="auto-bg-toggle">
      <input type="checkbox" id="autoBgCheckPanel" checked> 自动背景（大面积在后）
    </label>
    <div class="path-list" id="layerPathList"></div>
  </div>
  <div class="layer-footer">
    <button class="text-btn" id="resetPathColors" style="width:100%">↩ 重置路径颜色</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="paste-panel" id="pastePanel">
  <textarea id="pasteText" placeholder="在此粘贴SVG代码..."></textarea>
  <div class="row">
    <button class="text-btn" id="cancelPaste">取消</button>
    <button class="text-btn" id="applyPaste">应用</button>
  </div>
</div>

</body>
</html>
