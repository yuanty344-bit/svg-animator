<body>
<!-- 顶部栏：配置层 -->
<div class="top-bar" id="topBar">
  <div class="bar-row">
    <!-- 组0：上传 -->
    <div class="upload-inline" id="uploadFloat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
      <span>上传 SVG</span>
      <input type="file" id="fileInput" accept=".svg">
    </div>
    <span class="bar-sep"></span>
    <!-- 组1：颜色 -->
    <span class="bar-label">描边</span><input type="color" id="strokeColor" value="#ffffff" title="描边颜色">
    <span class="bar-label">填色</span><input type="color" id="fillColor" value="#ffffff" title="填色颜色">
    <label class="sync-inline" title="填色跟随描边"><input type="checkbox" id="syncColors" checked>同步</label>
    <span class="bar-sep"></span>
    <!-- 组2：动画选项 -->
    <label class="sync-inline" title="恢复SVG原始颜色"><input type="checkbox" id="preserveColors">保留原色</label>
    <label class="sync-inline" title="路径逐条绘制"><input type="checkbox" id="sequentialMode">逐条</label>
    <span class="bar-label">间隔</span><input type="range" id="staggerFactor" min="0.5" max="3" value="1" step="0.25"><span class="val" id="staggerVal">1×</span>
    <label class="sync-inline" title="动画结束后保留描边轮廓"><input type="checkbox" id="keepStrokes" checked>保留描边</label>
    <select id="easing" class="easing-select" title="动画缓动曲线">
      <option value="linear">线性</option>
      <option value="ease-in">缓入</option>
      <option value="ease-out">缓出</option>
      <option value="ease-in-out">缓入缓出</option>
    </select>
    <span class="bar-sep"></span>
    <button class="mini-btn" id="presetFast" title="快速预览">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>快速
    </button>
    <button class="mini-btn" id="presetStd" title="标准展示">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>标准
    </button>
    <button class="mini-btn" id="presetFilm" title="电影级慢速">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20M17 2v20M2 7h5M2 17h5M17 7h5M17 17h5"/></svg>电影
    </button>
    <span class="bar-sep"></span>
    <!-- 组3：背景 -->
    <span class="bar-label">背景</span><input type="color" id="bgColor" value="#000000" title="背景颜色">
    <span class="bar-sep"></span>
    <!-- 组4：工具 -->
    <div class="icon-btn" id="pasteBtn" title="粘贴SVG代码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 2v2h8V2" stroke-linecap="round"/></svg><span class="icon-label">粘贴</span></div>
    <div class="icon-btn" id="layerBtn" title="图层设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg><span class="icon-label">图层</span></div>
    <div class="icon-btn" id="resetBtn" title="恢复默认设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg><span class="icon-label">重置</span></div>
    <span class="bar-sep"></span>
    <!-- 组5：导出 -->
    <div class="icon-btn" id="shareBtn" title="复制当前画面SVG代码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.7 13.7l6.6 3.3M15.3 5.3l-6.6 3.3" stroke-linecap="round"/></svg><span class="icon-label">分享</span></div>
    <select id="exportFormat" class="export-select"><option value="html">HTML</option><option value="svg">SVG</option><option value="png">PNG</option><option value="jpg">JPG</option></select>
    <button class="text-btn" id="dlBtn">⬇ 下载</button>
  </div>
</div>

<div class="preview-area" id="previewArea">
  <div class="preview-bg" id="previewBg">
    <svg id="previewSvg" viewBox="0 0 1024 1024"></svg>
  </div>
</div>

<!-- 底部栏：播放层 -->
<div class="bottom-bar" id="bottomBar">
  <div class="icon-btn" id="playPauseBtn" title="暂停 / 继续">
    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
  </div>
  <div class="timeline-wrap">
    <input type="range" id="timeline" min="0" max="100" value="0" step="0.1" title="键盘←→移动 (Shift加速)">
    <span class="val" id="timeVal">0%</span>
  </div>
  <div class="ctrl-group">
    <label>速度</label>
    <input type="range" id="speed" min="0.25" max="4" value="1" step="0.25">
    <span class="val" id="speedVal">1×</span>
  </div>
  <div class="ctrl-group">
    <label>描边</label>
    <input type="range" id="strokeWidth" min="1" max="20" value="8" step="0.5">
    <span class="val" id="strokeWidthVal">8</span>
  </div>
</div>

<div class="layer-panel" id="layerPanel">
  <div class="layer-header" id="layerHeader">
    <span>图层设置</span>
    <button class="layer-close" id="layerClose">✕</button>
  </div>
  <div class="layer-body">
    <label class="auto-bg-toggle">
      <input type="checkbox" id="autoBgCheckPanel" checked> 自动背景（大面积在后）
    </label>
    <div class="path-list" id="layerPathList"></div>
  </div>
  <div class="layer-footer">

</div>
